services:
  - type: web
    name: brent-and-co
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --threads 4 --timeout 120
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: SESSION_COOKIE_SAMESITE
        value: Lax
      - key: SESSION_COOKIE_DOMAIN
        sync: false
      - key: SSO_SHARED_SECRET
        generateValue: true
      - key: DEBUG_SSO
        value: "0"
      - key: BRENT_PUBLIC_URL
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: BRENT_OWNER_EMAIL
        sync: false
      - key: FIND_THE_BEAT_SSO_CONSUME_URL
        sync: false
      - key: LETS_COOK_SSO_CONSUME_URL
        sync: false
      - key: SECOND_CHANCE_SSO_CONSUME_URL
        sync: false
